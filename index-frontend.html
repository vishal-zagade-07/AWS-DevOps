<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoHub - Premium Car Dealership</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">🚗 AutoHub</div>
            <div class="nav-menu">
                <a href="#" onclick="showHome()">Home</a>
                <a href="#" onclick="showCars()">Browse Cars</a>
                <a href="#" onclick="showCart()">Cart</a>
                <div id="auth-buttons">
                    <button class="btn btn-outline" onclick="showLoginModal()">Login</button>
                    <button class="btn btn-primary" onclick="showRegisterModal()">Register</button>
                </div>
                <div id="user-menu" style="display:none;">
                    <span id="user-name"></span>
                    <button class="btn btn-small" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="home-section">
        <section class="hero">
            <h1>Find Your Perfect Car</h1>
            <p>Premium vehicles at unbeatable prices</p>
            <button class="btn btn-large" onclick="showCars()">Browse Inventory</button>
        </section>
    </div>

    <div id="cars-section" style="display:none;">
        <div class="container">
            <h2>Available Cars</h2>
            <div class="filters">
                <input type="text" id="brandFilter" placeholder="Filter by brand" onkeyup="filterCars()">
                <input type="number" id="minPrice" placeholder="Min price" onkeyup="filterCars()">
                <input type="number" id="maxPrice" placeholder="Max price" onkeyup="filterCars()">
                <button class="btn" onclick="filterCars()">Search</button>
            </div>
            <div id="cars-list" class="cars-grid"></div>
        </div>
    </div>

    <div id="cart-section" style="display:none;">
        <div class="container">
            <h2>Shopping Cart</h2>
            <div id="cart-items"></div>
            <button class="btn btn-primary" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2>Login</h2>
            <form onsubmit="login(event)">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRegisterModal()">&times;</span>
            <h2>Register</h2>
            <form onsubmit="register(event)">
                <input type="text" id="registerName" placeholder="Full Name" required>
                <input type="email" id="registerEmail" placeholder="Email" required>
                <input type="password" id="registerPassword" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
        </div>
    </div>

    <!-- Car Details Modal -->
    <div id="carModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCarModal()">&times;</span>
            <div id="car-details"></div>
            <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 AutoHub - Premium Car Dealership. All rights reserved.</p>
        <p>Contact: info@autohub.com | Phone: +1-800-CARS</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
