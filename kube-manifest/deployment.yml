apiVersion: apps/v1
kind: Deployment
metadata:
  name: car-website-app
  namespace: default
  labels:
    app: car-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: car-website
  template:
    metadata:
      labels:
        app: car-website
    spec:
      containers:
      - name: car-website-container
        image: car-website:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: car-website-service
  namespace: default
  labels:
    app: car-website
spec:
  type: ClusterIP
  selector:
    app: car-website
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
